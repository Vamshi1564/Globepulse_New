<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Chat Client (robust)</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#e5ddd5; display:flex; align-items:center; justify-content:center; height:100vh; }
  .chat-container { width:420px; height:88vh; background:#fff; border-radius:12px; box-shadow:0 6px 30px rgba(0,0,0,0.15); display:flex; flex-direction:column; overflow:hidden; }
  .chat-header { background:#075e54; color:#fff; padding:12px 16px; font-weight:700; }
  #status { font-size:12px; opacity:.9; margin-top:4px; }
  #chat { flex:1; padding:14px; overflow-y:auto; background:#efeae2; }
  .bubble{ padding:10px 14px; border-radius:10px; margin:8px 0; max-width:76%; position:relative; font-size:14px; }
  .self{ background:#d4f8c4; margin-left:auto; border-bottom-right-radius:2px; }
  .other{ background:#fff; margin-right:auto; border-bottom-left-radius:2px; }
  .meta { font-size:11px; color:#666; margin-top:6px; text-align:right; }
  .chat-input { display:flex; gap:8px; padding:10px; background:#f6f6f6; border-top:1px solid #e0e0e0; }
  #msg { flex:1; padding:10px 12px; border-radius:20px; border:1px solid #ccc; outline:none; font-size:14px; }
  #sendBtn { background:#075e54; color:white; border:none; padding:10px 14px; border-radius:50%; cursor:pointer; }
  #typing { font-size:12px; color:#444; padding:6px 14px 0 14px; height:18px; }
  .small { font-size:12px; color:#666; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    Live Chat
    <div id="status" class="small">Connecting...</div>
  </div>

  <div id="typing" class="small"></div>
  <div id="chat"></div>

  <div class="chat-input">
    <input id="msg" placeholder="Type a message..." autocomplete="off">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
/* ---------- CONFIG (from URL params) ---------- */
const params = new URLSearchParams(location.search);
const username = params.get('username') || ('user' + Math.floor(Math.random()*1000));
const toUser = params.get('to') || null;
const role = params.get('role') || 'client';
const WS_URL = "wss://api.gfebusiness.org:8443";

/* ---------- UI refs ---------- */
const statusEl = document.getElementById('status');
const chatBox = document.getElementById('chat');
const msgInput = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');

/* ---------- helpers ---------- */
function nowTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function appendMsg(obj) {
  const div = document.createElement('div');
  div.className = 'bubble ' + (obj.user === username ? 'self' : 'other');
  const who = (obj.user === username) ? 'You' : obj.user;
  const toLabel = obj.to ? ` → ${obj.to}` : '';
  div.innerHTML = `<div><strong>${who}</strong>${toLabel}</div>
                   <div>${escapeHtml(obj.message)}</div>
                   <div class="meta">${nowTime()}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

/* ---------- robust websocket with ready check & queue ---------- */
let ws;
let sendQueue = [];
function connect() {
  ws = new WebSocket(WS_URL);

  ws.addEventListener('open', () => {
    statusEl.textContent = `Connected as ${username} (${role})`;
    // Send JOIN after open
    safeSend({ type: 'join', user: username, role: role });
    // Request presence list
    safeSend({ type: 'list' });

    // flush queue
    while(sendQueue.length) {
      ws.send(JSON.stringify(sendQueue.shift()));
    }
    console.log('WS open');
  });

  ws.addEventListener('message', (ev) => {
    console.log('WS RAW:', ev.data);
    let d;
    try { d = JSON.parse(ev.data); } catch (e) { console.warn('Invalid JSON', ev.data); return; }

    // handle types
    if (d.type === 'auth') {
      if (d.success) {
        statusEl.textContent = `Authenticated as ${d.username} (${d.role})`;
      } else {
        statusEl.textContent = 'Auth failed';
      }
      return;
    }

    if (d.type === 'presence') {
      const list = Array.isArray(d.users) ? d.users.join(', ') : '';
      statusEl.textContent = `Online: ${list || '0'}`;
      return;
    }

    if (d.type === 'typing') {
      if (d.user && d.user !== username) {
        typingEl.textContent = `${d.user} is typing...`;
        // clear after 1.5s to avoid flicker
        clearTimeout(typingEl._t);
        typingEl._t = setTimeout(()=> typingEl.textContent = '', 1500);
      }
      return;
    }

    if (d.type === 'message') {
      // Basic validation
      if (!d.user || !d.message) return;
      appendMsg(d);
      return;
    }

    // unknown type - log
    console.log('Unknown ws type:', d);
  });

  ws.addEventListener('close', () => {
    statusEl.textContent = 'Disconnected — reconnecting...';
    setTimeout(connect, 1500); // auto-reconnect
  });

  ws.addEventListener('error', (err) => {
    console.error('WS error', err);
    statusEl.textContent = 'WebSocket Error';
  });
}
connect();

/* ---------- safeSend ensures ws is open or queues ---------- */
function safeSend(obj) {
  const text = JSON.stringify(obj);
  if (!ws || ws.readyState !== 1) {
    // queue it
    sendQueue.push(obj);
    console.log('Queued send', obj);
    return;
  }
  ws.send(text);
}

/* ---------- UI event handlers ---------- */
sendBtn.onclick = send;
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

let typingTimer = 0;
msgInput.addEventListener('input', () => {
  const tObj = { type: 'typing', user: username, to: toUser };
  safeSend(tObj);

  // local typing indicator reset (so sender sees own typing briefly)
  clearTimeout(typingTimer);
  typingEl.textContent = 'You are typing...';
  typingTimer = setTimeout(()=> typingEl.textContent = '', 800);
});

function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  safeSend({
    type: "message",
    user: username,
    to: toUser,
    message: text,
    role: role
  });

  msgInput.value = "";
}


/* ---------- debug: expose ws on window for console testing ---------- */
window._ws = () => ws;
window._send = (o) => { safeSend(o); };
</script>

</body>
</html>
